<!DOCTYPE html>
<html>
<head>
<title>Lexora Prep</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#f4f4f4;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);

}

input{
padding:12px;
width:70%;
border:1px solid #ccc;

}

button{
padding:12px 20px;
background:black;
color:white;
border:none;
border-radius:6px;
margin-top:15px;
cursor:pointer;
}

p.small{
color:#777;
font-size:14px;
margin-top:20px;
}
</style>
</head>

<body>

<div class="box">

<h1>Lexora Prep</h1>

<p>A smarter way to memorize Black Letter Law for the U.S. Bar Exam.</p>

<input type="email" placeholder="Enter your email">

</div>

</html>
