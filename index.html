<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lexora Prep</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cormorant Garamond',serif;
background:#f6f2ea;
color:#1a1a1a;
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
display:grid;
grid-template-columns:1fr 380px;
gap:60px;
}

h1{
font-size:56px;
line-height:1.05;
margin-bottom:20px;
}

.engine{
background:#0e0e0e;
color:#9cff9c;
padding:20px;
font-family:'JetBrains Mono',monospace;
margin-top:20px;
border-radius:4px;
min-height:60px;
}

.card{
background:#efe9df;
padding:25px;
border:1px solid #ddd;
}

.title{
font-size:26px;
margin-bottom:5px;
}

.sub{
font-family:'JetBrains Mono';
font-size:11px;
letter-spacing:.18em;
text-transform:uppercase;
margin-bottom:20px;
}

.bar{
height:4px;
background:#ddd;
margin-bottom:20px;
position:relative;
}

.fill{
position:absolute;
height:100%;
background:#111;
width:0;
}

.row{
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px;
font-family:'JetBrains Mono';
border:1px solid #ccc;
}

button{
padding:12px 18px;
background:#111;
color:#fff;
border:none;
cursor:pointer;
}

.success{
display:none;
background:#e7f6ea;
padding:10px;
margin-top:10px;
}

footer{
padding:20px;
text-align:center;
border-top:1px solid #ddd;
margin-top:40px;
}

.popup{
position:fixed;
bottom:20px;
left:20px;
background:#111;
color:#fff;
padding:10px 14px;
font-size:12px;
border-radius:4px;
font-family:'JetBrains Mono';
animation:fadein .4s;
}

@keyframes fadein{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

/* MOBILE */

@media(max-width:900px){

.container{
grid-template-columns:1fr;
}

.row{
flex-direction:column;
}

}

</style>

</head>

<body>

<div class="container">

<div>

<h1>
Know Every<br>
Black Letter Rule<br>
with Lexora.
</h1>

<div class="engine">
<span id="typing"></span>
</div>

</div>

<div class="card">

<div class="title">Reserve your spot before launch</div>

<div class="sub">First 500 bar candidates only</div>

<div style="display:flex;justify-content:space-between;margin-bottom:5px">
<span>Spots Remaining</span>
<span id="spots">60 / 500</span>
</div>

<div class="bar">
<div class="fill" id="fill"></div>
</div>

<div class="row" id="formRow">

<input id="email" type="email" placeholder="your@email.com">

<button onclick="submitEmail()">Notify Me</button>

</div>

<div class="success" id="success">
You're on the list. We'll email you when Lexora launches.
</div>

</div>

</div>

<footer>
© 2026 Lexora Prep
</footer>

<script>

/* COUNTER */

const TOTAL=500
let claimed=60

const spots=document.getElementById("spots")
const fill=document.getElementById("fill")

function update(){

const left=TOTAL-claimed
const pct=(claimed/TOTAL)*100

spots.innerText=left+" / "+TOTAL
fill.style.width=pct+"%"

}

update()

/* EMAIL SUBMISSION */

async function submitEmail(){

const email=document.getElementById("email").value.trim()

if(!email.includes("@")) return

await fetch("https://formspree.io/f/xgonnabr",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({email})
})

claimed+=2
update()

document.getElementById("formRow").style.display="none"
document.getElementById("success").style.display="block"

}

/* SOCIAL PROOF POPUPS */

const names=["Alex","Sarah","Daniel","Chris","Maria","David"]
const cities=["NY","Texas","Chicago","California"]

function popup(){

const name=names[Math.floor(Math.random()*names.length)]
const city=cities[Math.floor(Math.random()*cities.length)]

const div=document.createElement("div")
div.className="popup"

div.innerText=name+" from "+city+" joined the waitlist"

document.body.appendChild(div)

setTimeout(()=>div.remove(),5000)

}

setInterval(popup,20000)

/* TYPING ENGINE */

const rules=[

"Rule #101 — Consideration requires a bargained-for exchange.",

"Rule #214 — A valid contract requires offer, acceptance, and consideration.",

"Rule #338 — Hearsay is an out-of-court statement offered for the truth of the matter asserted.",

"Rule #412 — Negligence requires duty, breach, causation, and damages.",

"Rule #517 — Personal jurisdiction requires minimum contacts."

]

let ruleIndex=0
let charIndex=0

const typingEl=document.getElementById("typing")

function typeRule(){

if(charIndex<rules[ruleIndex].length){

typingEl.textContent+=rules[ruleIndex].charAt(charIndex)
charIndex++

setTimeout(typeRule,30)

}

else{

setTimeout(()=>{

typingEl.textContent=""
charIndex=0
ruleIndex=(ruleIndex+1)%rules.length

typeRule()

},2500)

}

}

typeRule()

</script>

</body>
</html>
